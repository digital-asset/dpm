name: release
description: release
inputs:
  registry:
    type: string
    description: GAR registry to use when publishing
    default: "europe-docker.pkg.dev"
  repo:
    type: string
    description: GAR repo to use when publishing
    default: "da-images/public-unstable"
  flags:
    type: string
    description: Additional flags to pass to goreleaser
    default: "--snapshot"
  key:
    type: string
    description: auth key
    required: true
  gh_token:
    description: github auth secret
    required: false
runs:
  using: composite
  steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
    - uses: ./.github/actions/nix
    - uses: ./.github/actions/gcloud-login
      with:
        key: ${{ inputs.key }}
    - run: |
        export GIT_COMMIT_COUNT=$(git rev-list --count HEAD)
        goreleaser ${{ inputs.flags }}
        
        # export this env var so that the NSIS build can use it in the output filename
        DPM_BIN_VERSION="$(cat dist/metadata.json | jq -r .version)"
        echo "DPM_BIN_VERSION=${DPM_BIN_VERSION}" >> "${GITHUB_ENV}"
      shell: bash -euo pipefail -c "source nix.source && exec bash {0}"
    - name: dpm publish dry-run
      run: make publish-release-to-gar ASSISTANT_ARGS='-d'
      shell: bash -euo pipefail -c "source nix.source && exec bash {0}"
    - name: dpm publish to ${{ inputs.repo }}
      run: |
        sanitize_extra_tag() {
         echo "${1//\//-}"
        }
        EXTRA_TAGS="-t $(sanitize_extra_tag ${{ github.ref_name }})"
        
        # latest only on tagged release
        if [[ "${{ github.ref_type }}" == "tag" && "${{ github.event_type }}" != "pull_request" ]]; then
           EXTRA_TAGS="$EXTRA_TAGS -t latest"
        fi
        make publish-release-to-gar ASSISTANT_ARGS='--registry ${{ inputs.registry }}/${{ inputs.repo }} '"$EXTRA_TAGS"
      shell: bash -euo pipefail -c "source nix.source && exec bash {0}"
    - uses: ./.github/actions/nsis
      with:
        bin-path: dist/windows/amd64/dpm.exe
        out: dist/dpm-${DPM_BIN_VERSION}-windows-amd64.exe
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      if: inputs.flags != '--snapshot'
      run: |
        gh release create ${{ github.ref_name }} \
          dist/dpm-* \
          --generate-notes \
          --title ${{ github.ref_name }}
      shell: bash -euo pipefail -c "source nix.source && exec bash {0}"
