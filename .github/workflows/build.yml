name: build
on:
  push:

defaults:
  run:
    shell: bash -euo pipefail -c "source nix.source && exec bash {0}"

jobs:
  linux:
    runs-on: digital-asset-dpm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/nix

      - name: Run go build
        run: go build -o target/ ./cmd/...

      - name: Run Go tests and generate in json format
        run: go test -json -v ./... | tee report.json; exit ${PIPESTATUS[0]}

      - name: Check for stale generated docs
        run: make check-stale-docs

      - name: Publish Test Report
        uses: dorny/test-reporter@fe45e9537387dac839af0d33ba56eed8e24189e8
        with:
          name: Go Tests
          path: report.json
          reporter: golang-json
          fail-on-error: 'true'
          fail-on-empty: 'true'
          report-title: 'Go Tests'
      - name: Run manual installation
        run: docs/src/public/manual-install.sh
      - uses: ./.github/actions/nsis
        with:
          bin-path: target/dpm

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23.5'
      - run: go build -o target/ ./cmd/...
        shell: bash
      - name: Run Go tests and generate in json format
        run: go test -json -v ./... | tee report.json; exit ${PIPESTATUS[0]}
        shell: bash
      - name: Publish Test Report
        uses: dorny/test-reporter@fe45e9537387dac839af0d33ba56eed8e24189e8
        with:
          name: Go Tests
          path: report.json
          reporter: golang-json

  release-public:
    runs-on: digital-asset-dpm
    needs: 
      - windows
      - linux
    if: success() && (github.ref_name == 'refs/head/main' || startsWith(github.ref_name, 'refs/heads/release')) 
    steps: # Public release on main or release branch only
      - name: Check if VERSION changed
        id: changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q 'VERSION'; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            version=$(cat VERSION | tr -d ' ')
            git tag -a ${version} -m "version ${version}"
            echo "version=${version}" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release
        if: steps.changes.outputs.version_changed == 'true'
        with:
          repo: da-images/public
          flags: "--clean --skip=announce,publish,validate"
          git_tag: ${{steps.changes.outputs.version}}

  release-public-unstable:
    runs-on: digital-asset-dpm
    needs: 
      - windows
      - linux
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/release
        with:
          repo: da-images/public-unstable
          flags: "--snapshot"
          key: ${{ secrets.DA_IMAGES }}
